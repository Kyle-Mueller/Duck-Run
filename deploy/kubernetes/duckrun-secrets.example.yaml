# Copy to duckrun-secrets.yaml and replace the values before applying.
# DO NOT commit real secrets — use Sealed Secrets, SOPS, or your secret manager.
apiVersion: v1
kind: Secret
metadata:
  name: duckrun-dashboard
  namespace: duckrun
type: Opaque
stringData:
  dashboard-secret: "replace-with-a-long-random-string"
  postgres-password: "replace-with-a-strong-password"
  admin-email: "you@example.com"
  admin-password: "replace-with-a-strong-admin-password"
